// Faixas de comissão por TOTAL no período.
function commissionRate(total) {
  if (total >= 100000) return 0.03;
  if (total >= 50000) return 0.025;
  return 0.02;
}
function rateLabel(total) {
  return `${(commissionRate(total) * 100).toString().replace(".", ",")}%`;
}

// Janela quinzenal de fechamento: 26→10 e 11→25.
function payWindow(ref = new Date()) {
  const d = ref.getDate();
  if (d >= 26 || d <= 10) return "26→10 (quinzena A)";
  return "11→25 (quinzena B)";
}

// Calcula a comissão de UMA venda conforme a regra do consultor.
// Suporta: percentual, valor fixo, ou faixa (sobre o acumulado do período).
function calcCommissionForSale(rule, saleValue, accumulatedBefore = 0) {
  if (!rule) return {
    ok: false,
    reason: "SEM_REGRA",
    amount: 0
  };
  if (rule.type === "percentual") return {
    ok: true,
    amount: saleValue * (rule.percent ?? 0) / 100
  };
  if (rule.type === "fixo") return {
    ok: true,
    amount: rule.fixed ?? 0
  };
  if (rule.type === "faixa") {
    // Faixa pelo total acumulado após esta venda (consistente com a tela Comissão).
    const totalAfter = accumulatedBefore + saleValue;
    const amount = saleValue * commissionRate(totalAfter);
    return {
      ok: true,
      amount
    };
  }
  return {
    ok: false,
    reason: "SEM_REGRA",
    amount: 0
  };
}

// Monta a mensagem de parabéns para o WhatsApp do consultor.

}

}
